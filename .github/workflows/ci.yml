name: QA Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Validate test files exist
        run: |
          echo "Checking test files..."
          ls tests/e2e/
          ls tests/api/
          echo "All test files present"

      - name: Check playwright config
        run: |
          echo "Playwright config:"
          cat playwright.config.js

      - name: Upload test structure
        uses: actions/upload-artifact@v4
        with:
          name: test-files
          path: tests/